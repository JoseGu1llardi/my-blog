services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres-dev
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blog-app-dev
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blogdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: ZGV2LWxvY2FsLXNlY3JldC1rZXktbWluaW11bS0zMi1jaGFycy1sb25n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge