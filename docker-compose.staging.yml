services:
  db:
    image: postgres:15-alpine
    container_name: blog-db-staging
    environment:
      POSTGRES_DB: blogdb_staging
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration/V1__init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d blogdb_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-app-staging
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DATABASE_URL: jdbc:postgresql://db:5432/blogdb_staging
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION: ${APP_JWT_EXPIRATION:-3600000}
      STAGING_AUTHOR_PASSWORD: ${STAGING_AUTHOR_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "8080:8080"

volumes:
  postgres_staging_data:

