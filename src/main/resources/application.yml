spring:
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: http://localhost:3000
  base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION:3600000}
