spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.joseguillard.my_blog: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://guillard-dev.netlify.app/}
  init:
    password: ${AUTHOR_PASSWORD}
    email: ${AUTHOR_EMAIL}

  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false