spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/blogdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  flyway:
    enabled: false

logging:
  level:
    com.joseguillard.my_blog: DEBUG
    org.hibernate.SQL: DEBUG

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
  init:
    password: ${DEV_AUTHOR_PASSWORD:sa}