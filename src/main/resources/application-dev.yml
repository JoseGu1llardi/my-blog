spring:
  datasource:
    url: jdbc:h2:mem:blogdb
    driver-class-name: org.h2.Driver
    username: guillard
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

logging:
  level:
    com.joseguillard.my_blog: DEBUG
    org.hibernate.SQL: DEBUG

app:
  init:
    password: ${DEV_AUTHOR_PASSWORD:sa}
